{% load i18n %}
<section class="w-panel">
    <h2 class="w-panel__heading">{% trans "Clani organizacije" %}</h2>
    <div class="w-panel__content">
        {% if members %}
            <ul>
                {% for member in members %}
                    <li><a href="{% url 'wagtailusers_users:edit' member.pk %}">{{ member.email }}</a></li>
                {% endfor %}
            </ul>
        {% else %}
            -
        {% endif %}
    </div>
</section>
