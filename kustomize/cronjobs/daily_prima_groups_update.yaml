apiVersion: batch/v1
kind: CronJob
metadata:
  name: rog-prima-groups-update
spec:
  schedule: "15 6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          containers:
            - name: rog-prima-groups-update
              image: rog
              command:
                - python
                - manage.py
                - prima_groups_daily_reset
              env:
                - name: DJANGO_SETTINGS_MODULE
                  value: rog.settings.production
              envFrom:
                - secretRef:
                    name: rog-credentials
          restartPolicy: Never
